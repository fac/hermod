version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    rebase-strategy: disabled
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      exclude:
        - fac/*
